name: Branch Cleaning

on:
  push:
    branches:
      - master # Executa apenas quando há merge na master

jobs:
  cleanup_merged_branches:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessário para deletar branches remotas
    steps:
      - name: Checkout com histórico completo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Busca todo o histórico para comparação correta de commits

      - name: Deletar branches sem commits à frente da master
        run: |
          git fetch --prune origin

          PROTECTED_BRANCHES="main master develop homolog"

          # Lista branches remotas totalmente mescladas na master (sem commits únicos)
          MERGED_BRANCHES=$(git branch -r --merged origin/master \
            | grep -v 'HEAD' \
            | sed 's|^ *origin/||')

          if [ -z "$MERGED_BRANCHES" ]; then
            echo "Nenhuma branch mesclada encontrada."
            exit 0
          fi

          for branch in $MERGED_BRANCHES; do
            PROTECTED=false
            for p in $PROTECTED_BRANCHES; do
              if [ "$branch" = "$p" ]; then
                PROTECTED=true
                break
              fi
            done

            if [ "$PROTECTED" = "true" ]; then
              echo "Branch protegida, ignorando: $branch"
            else
              echo "Deletando branch mesclada: $branch"
              git push origin --delete "$branch"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Feedback de limpeza
        if: success()
        run: echo "Limpeza concluída. Branches mescladas na master foram removidas."    