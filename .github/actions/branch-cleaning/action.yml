name: 'Branch Cleaning'

description: 'Limpa branches remotas totalmente mescladas em um branch base.'

author: 'VendeMais Team'

inputs:
  base-branch:
    description: 'Branch base usada para verificar merges.'
    required: false
    default: 'master'

  protected-branches:
    description: 'Lista de branches protegidas que não serão removidas, separadas por vírgula.'
    required: false
    default: 'main,master,develop'

  github-token:
    description: 'Token para permitir exclusão de branches remotas.'
    required: true

runs:
  using: composite

  steps:
    - name: Checkout com histórico completo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Executar script de limpeza de branches
      shell: bash
      run: bash ${{ github.action_path }}/delete-merged-branches.sh "${{ inputs.base-branch }}" "${{ inputs.protected-branches }}"
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}

branding:
  icon: 'trash-2'
  color: 'red'
