name: 'Branch Cleaning'

description: 'Limpa branches remotas desatualizadas que não possuem novos commits em relação a master.'

author: 'VendeMais Team'

inputs:
  base-branch:
    description: 'Branch base usada para verificar atualizações.'
    required: false
    default: 'master'

  protected-branches:
    description: 'Lista de branches protegidas que não serão removidas, separadas por vírgula.'
    required: false
    default: 'main,master,develop'

  github-token:
    description: 'Token para permitir exclusão de branches remotas.'
    required: true

runs:
  using: composite

  steps:
    - name: Preparar ambiente
      shell: bash
      run: |
        git fetch --prune origin
        echo "✅ Repositório atualizado"

    - name: Executar limpeza de branches
      shell: bash
      run: bash ${{ github.action_path }}/delete-merged-branches.sh "${{ inputs.base-branch }}" "${{ inputs.protected-branches }}"
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}

branding:
  icon: 'trash-2'
  color: 'red'
